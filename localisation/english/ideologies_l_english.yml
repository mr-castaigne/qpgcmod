l_english:

 futurism:0 "Futurist"
 futurism_noun:0 "Futurism"
 futurism_desc:0 "Futurist"
 romantic_nationalism:0 "Romantic Nationalism"
 romantic_nationalism_desc:0 "§WRomantic Nationalism§! is a form of nationalism in which the state derives its political legitimacy as an organic consequence of the unity of the individuals it governs, and it was historically one of the most prominent ideologies driving republican and liberal revolutionary movements. In the context of Futurism, the nation is seen as something reliant on progress to survive and evolve into novel and greater forms.§g(Description partly lifted from the Philosophyball Wiki.)§!"
 uneasiness:0 "Beating Drums"
 uneasiness_desc:0 ""Stripping back the layers of complications in politics, we find a bare dichotomy, two directions in politics, in terms of ethics: backwards and forwards. Backwards, to preserve the wisdom of the past and stability of civilization. Forwards, to push ahead into the unknown, fearlessly. However, we can simplify social politics even further into one diagnosis: the world of yesterday is gone, and the world now is new, with new conditions, new effects, and new potential. No reactionary movement is necessary under these conditions. The only way we can ever go is forward."\n- Kit Traum"

 vanguardism:0 "Vanguard Socialist"
 vanguardism_noun:0 "Vanguard Socialism"
 vanguardism_desc:0 "Socialist"
 left_futurism:0 "Left-Futurism"
 left_futurism_desc:0 "§RLeft-Futurism§! is a current within the Futurist movement dominated by the revolutionary urban proletariat. It places greater influence on the abolition of class, the seizure of the means of production, and the development of an economy free from the anarchy and limitations of market production than mainline Futurism, and seeks a rationally and organically planned society overseen by a strong state that pervades and is composed of the whole of society, protecting the wellbeing of the people and harmoniously guiding a free and equal mankind towards heights never yet seen before, towards a post-scarcity society spanning the stars."

 socialism:0 "Popular Socialist"
 socialism_noun:0 "Popular Socialism"
 socialism_desc:0 "Socialist"
 eco_socialism:0 "Eco-Socialism"
 eco_socialism_desc:0 "§tEco-Socialism§! is an environmentalist, socialist, and otherwise varied ideology. Eco-Socialists believe that the end of capitalism and the end of ecological collapse are goals that are hand-in-hand, and that the latter cannot be achieved without the former. Common ills of class society that Eco-Socialists take special issue with are the influence of corporations in developing (not preventing the development of) environmental policy, reckless overproduction of commodities and the exploitation of the environment that production requires, and the concentration of industry and urbanization leading to illness and pollution. Common proposals by Eco-Socialists include the scaling back of industrial growth, increasing the power of local communities, transitioning away from traditional energy sources and methods of production, and eliminating the urban-rural divide."
 democratic_socialism:0 "Democratic Socialism"
 democratic_socialism_desc:0 "§tDemocratic Socialism§! is a current of socialism that wishes to achieve workers' ownership over the means of production through democratic and peaceful means, including union activism, participation in electoralism, and the establishment of grassroots alternatives to traditional capitalist organizations."

 postmodern_socialism:0 "Postmodern Socialist"
 postmodern_socialism_noun:0 "Postmodern Socialism"
 postmodern_socialism_desc:0 "Socialist"
 communization_theory:0 "Communization Theory"
 communization_theory_desc:0 "WIP (this is for Mari)"
 autonomous_socialism:0 "Autonomous Socialism" 
 autonomous_socialism_desc:0 "WIP (this is for Ben)"
 hegelian_marxism:0 "Hegelian Marxism"
 hegelian_marxism_desc:0 "WIP (this is for Ashley)"

 liberalism:0 "Liberal"
 liberalism_noun:0 "Liberalism"
 liberalism_desc:0 "Liberal"
 social_democracy:0 "Social Democracy"
 social_democracy_desc:0 "§9Social Democracy§! is an ideology that centers on mediating the excesses of capitalism through the formation or strengthening of a democratic, paternalistic government. It advocates for strong welfare programs, large-scale unionization of the workforce, and the usage of strict regulation to promote social justice, and is usually culturally progressive, albeit not always."
 sealerism:0 "Sealerism"
 sealerism_desc:0 "*Bark* *Bark* Every seal gets a fish. The seals like Foucault. The seals like learning. *Claps* *Slaps my big belly*"

 autocracy:0 "Autocratic"
 autocracy_noun:0 "Autocracy"
 autocracy_desc:0 "Authoritarian"
 absolutism:0 "Absolutism"
 absolutism_noun:0 "Absolutist"
 absolutism_desc:0 "§gAbsolutism§! is a form of monarchism where all the power is concentrated in the hands of the monarch. It isn't an ideology per se and is more of a form of government as the monarch can implement whatever policies they want, however absolute monarchies tend to be overwhelmingly traditionalist and conservative."

 reactionary:0 "Reactionary"
 reactionary_noun:0 "Reactionism"
 reactionary_desc:0 "Authoritarian"
 aristocracy:0 "Aristocracy"
 aristocracy_desc:0 "The word §1Aristocracy§! comes from a Greek term, aristokratia, meaning "rule of the excellent". It is a system of governance where political authority resides with a small, privileged class considered the most qualified, often comprising nobility or elites. Positions within in an aristocracy are traditionally tied to inherited, propertied titles, though forms that give power based on scholarly merit or appointment by others already in power also exist."
 authoritarian_traditionalism:0 "Authoritarian Traditionalism"
 authoritarian_traditionalism_desc:0 "§1Authoritarian Traditionalist§! regimes are. Wait. You're reading these?"
 aristocratic_anarchism:0 "Aristocratic Anarchism"
 aristocratic_desc:0 "§bAristocratic Anarchism§ is an unorthodox form of anarchism primarily expounded by Lucien Fix and the broader House of Linzkirch. Based on the ideas of Friedrich Nietzsche, Georges Bataille, and Ernst Jünger, it seeks the total dismantling of current social institutions and the establishment of a society founded on noble sovereignty and ventures, life-affirmation, the glorification of meaningful strife, and the veneration of ancient gods and societies, especially those of the Greeks and the Germanic barbarians of old. Its ultimate aim is the establishment of a society focused upon artistic creation and the preservation of vitalistic culture."
 green_accelerationism:0 "Green Accelerationism"
 green_accelerationism_desc:0 "§GGreen Accelerationism§ is an ideology that combines radical environmentalism with militant accelerationism and a fervent belief in "natural law" and racist, sexist, and nationalist hierarchies. Eco-Fascists generally desire the downfall of modern industrial, multicultural society, preferring a world of racially-pure chiefdoms and tribes and the dominion of Mother Nature. Despite its movement's roots in Fascism, it rejects the totalitarian statism and urban modernity which its cousin Futurism inherited."

 dystopianism:0 "Dystopian"
 dystopianism_noun:0 "Dystopianism"
 dystopianism_desc:0 "Dystopian"