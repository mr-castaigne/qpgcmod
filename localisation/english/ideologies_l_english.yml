l_english:

 fascism:0 "Futurist"
 fascism_noun:0 "Futurism"
 fascism_desc:0 "Futurist"
 romantic_nationalism:0 "Romantic Nationalism"
 romantic_nationalism_desc:0 "§WRomantic Nationalism§! is a form of nationalism in which the state derives its political legitimacy as an organic consequence of the unity of the individuals it governs. Within futurism, the nation is seen as something reliant on progress to survive and evolve.§g(Description partly lifted from the Philosophyball Wiki.)§!"
 uneasiness:0 "Beating Drums"
 uneasiness_desc:0 ""Stripping back the layers of complications in politics, we find a bare dichotomy, two directions in politics, in terms of ethics: backwards and forwards. Backwards, to preserve the wisdom of the past and stability of civilization. Forwards, to push ahead into the unknown, fearlessly. However, we can simplify social politics even further into one diagnosis: the world of yesterday is gone, and the world now is new, with new conditions, new effects, and new potential. No reactionary movement is necessary under these conditions. The only way we can ever go is forward."\n- Kit Traum"

 postmodern_socialism:0 "Postmodern Socialist"
 postmodern_socialism_noun:0 "Postmodern Socialism"
 postmodern_socialism_desc:0 "Socialist"

 communism:0 "Populist Socialist"
 communism_noun:0 "Populist Socialism"
 communism_desc:0 "Socialist"
 eco_socialism:0 "Eco-Socialism"
 eco_socialism_desc:0 "§tEco-Socialism§! is an environmentalist, socialist, and otherwise varied ideology. Eco-Socialists believe that the reduction of environmental harm and socialist economics are complementary, as pollution is the result of mainly capitalist commodity production.\n\n§g(Description largely lifted from the Polcompball Wiki.)§!"
 democratic_socialism:0 "Democratic Socialism"
 democratic_socialism_desc:0 "§tDemocratic Socialism§! is a current of socialism that wishes to achieve workers' ownership over the means of production through democratic means."

 democratic:0 "Progressive"
 democratic_noun:0 "Progressivism"
 democratic_desc:0 "Democratic"
 social_democracy:0 "Social Democracy"
 social_democracy_desc:0 "§9Social Democracy§! is an economically center-left ideology. It is usually culturally left, albeit not exclusively. It advocates for strong welfare programs, unionization, with the addition of vast regulation to promote social justice.\n\n§g(Description largely lifted from the Polcompball Wiki.)§!"
 
 neutrality:0 "Reactionary"
 neutrality_noun:0 "Reactionism"
 neutrality_desc:0 "Authoritarian"
 aristocracy:0 "Aristocracy"
 aristocracy_desc:0 "The word §1Aristocracy§! comes from a Greek term, aristokratia, meaning "rule of the excellent". It is a system of governance where political authority resides with a small, priviledged class considered the most qualified, often comprising nobility or elites.\n\n§g(Description largely lifted from the Polcompball Wiki.)§!"
 authoritarian_traditionalism:0 "Authoritarian Traditionalism"
 authoritarian_traditionalism_desc:0 "§1Authoritarian Traditionalist§! regimes are. Wait. You're reading these?"